collection: ai-coding

# 카테고리 정의와 표시 순서. README/사이트는 이 순서대로 섹션을 만든다.
categories:
  - key: agent
    name: 코딩 에이전트
    description: 작업을 받아 스스로 코드를 읽고 쓰고 실행하는 자율 에이전트
  - key: app-builder
    name: 앱 빌더 (설명→앱)
    description: 자연어 설명만으로 동작하는 앱·UI를 생성하고 바로 배포하는 도구
  - key: cli
    name: 터미널 / CLI
    description: 터미널에서 쓰는 AI 코딩 도구
  - key: ide-extension
    name: IDE 확장
    description: VSCode·JetBrains 등 에디터에 통합되는 도구
  - key: review
    name: 코드 리뷰 / PR
    description: PR·커밋을 자동으로 리뷰하는 도구
  - key: mcp-server
    name: MCP 서버
    description: Model Context Protocol 서버 — 에이전트에 도구·데이터를 연결
  - key: prompt
    name: 프롬프트 / 스킬 / 룰
    description: 프롬프트·스킬·룰 모음과 관련 자원
