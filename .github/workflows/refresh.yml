name: refresh

# 매일 메타데이터(스타/커밋/상태) 갱신 → README 재빌드 → 변경 있으면 자동 커밋
on:
  schedule:
    - cron: "0 0 * * *" # 매일 00:00 UTC (한국 09:00)
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 메타데이터 갱신
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run refresh

      - name: README 재빌드
        run: npm run build:readme

      - name: 변경 있으면 커밋
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: 메타데이터 자동 갱신 ($(date -u +%Y-%m-%d))"
          git push
